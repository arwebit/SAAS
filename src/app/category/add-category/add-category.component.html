<div class="wrapper">
  <app-sidemenu></app-sidemenu>

  <div class="main">
    <app-top></app-top>

    <main class="content">
      <div class="container-fluid p-0">
        <h1 class="h3 mb-3"><strong>Add category</strong></h1>

        <div class="row">
          <div class="col-12 col-md-12 col-xxl-6 d-flex order-3 order-xxl-2">
            <div class="card flex-fill w-100">
              <div class="card-body px-4">
                <div class="card-header">
                  <b [class]="className">{{ message }}</b>
                </div>
                <form [formGroup]="addCategoryForm">
                  <div class="mt-10">
                    <label for="">Category name <b class="red"> * </b></label>
                    <input
                      type="text"
                      placeholder="Category name"
                      class="form-control"
                      formControlName="category_name"
                      (keyup)="slugTransform($event)"
                    />
                    <b class="red"> {{ categoryErr }} </b>
                  </div>
                  <div class="mt-10">
                    <label for="">Category slug <b class="red"> * </b></label>
                    <input
                      type="text"
                      placeholder="Category slug"
                      class="form-control"
                      formControlName="category_slug"
                      [(ngModel)]="slug"
                    />
                    <b class="red"> {{ slugErr }} </b>
                  </div>

                  <div class="mt-10">
                    <button class="btn btn-primary" (click)="save()">
                      Create
                    </button>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <app-bottom></app-bottom>
  </div>
</div>

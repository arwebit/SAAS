<div class="wrapper">
  <app-sidemenu></app-sidemenu>

  <div class="main">
    <app-top></app-top>

    <main class="content">
      <div class="container-fluid p-0">
        <h1 class="h3 mb-3"><strong>Change password</strong></h1>

        <div class="row">
          <div class="col-12 col-md-12 col-xxl-6 d-flex order-3 order-xxl-2">
            <div class="card flex-fill w-100">
              <div class="card-body px-4">
                <div class="card-header">
                  <b [class]="className">{{ message }}</b>
                </div>
                <form [formGroup]="passChangeForm">
                  <div class="mt-10">
                    <label for="">New password</label>
                    <input
                      type="password"
                      placeholder="New password"
                      class="form-control"
                      formControlName="new_pass"
                    />
                    <b class="red">{{ newPassErr }}</b>
                  </div>
                  <div class="mt-10">
                    <label for="">Confirm password</label>
                    <input
                      type="password"
                      placeholder="Confirm password"
                      class="form-control"
                      formControlName="confirm_pass"
                    />
                    <b class="red">{{ confirmPassErr }}</b>
                  </div>
                  <div class="mt-10">
                    <button class="btn btn-primary" (click)="chagePassword()">
                      Change password
                    </button>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <app-bottom></app-bottom>
  </div>
</div>
